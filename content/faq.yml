categories:
  - title: 'Getting Started'
    questions:
      - question: 'How do I send a case to Laguna Dental Arts?'
        answer: 'You can send cases through our digital platform, by mail, or via pickup service. Contact us for detailed instructions and to set up your account.'

      - question: 'What information do I need to include with my case?'
        answer: 'Please include a completed Rx form, detailed case notes, patient information, and any specific requirements. Digital scans should be accompanied by clear instructions.'

      - question: 'Do you provide pickup and delivery services?'
        answer: 'Yes, we offer convenient pickup and delivery services throughout California. Contact us to schedule regular routes or one-time pickups.'

  - title: 'Turnaround Times & Rush Cases'
    questions:
      - question: 'What are your standard turnaround times?'
        answer: 'Standard turnaround times vary by case type: crowns and bridges typically take 5-7 business days, while more complex cases may require additional time. We will provide specific timelines upon case evaluation.'

      - question: 'Do you offer rush services?'
        answer: 'Yes, we offer rush services for urgent cases. Rush cases can often be completed in 2-3 business days with advance notice. Additional fees may apply.'

      - question: 'How do I request a rush case?'
        answer: 'Mark your case as "RUSH" on the Rx form and contact us directly to confirm timing. We recommend calling to ensure we can accommodate your timeline.'

  - title: 'Digital Workflow'
    questions:
      - question: 'What digital scanners are compatible with your lab?'
        answer: 'We work with all major digital scanner systems including iTero, CEREC, 3Shape, and more. Our digital workflow team can assist with file compatibility.'

      - question: 'What file formats do you accept?'
        answer: 'We accept STL, PLY, and most proprietary scanner formats. If you are unsure about compatibility, please contact our digital team before sending.'

      - question: 'How do I submit digital impressions?'
        answer: "Digital files can be uploaded through our secure portal or sent via your scanner's direct integration. Contact us for login credentials and setup assistance."

  - title: 'Quality & Materials'
    questions:
      - question: 'What materials do you use?'
        answer: 'We use only FDA-approved, biocompatible materials from leading manufacturers. Our material selection includes ceramics, zirconia, precious and semi-precious alloys, and modern composite materials.'

      - question: 'Do you provide material certifications?'
        answer: 'Yes, we provide material certifications and documentation upon request. All our materials meet or exceed industry standards for biocompatibility and durability.'

      - question: 'What is your quality guarantee?'
        answer: 'We stand behind our work with a comprehensive quality guarantee. If any restoration does not meet our high standards, we will remake it at no charge.'

  - title: 'Billing & Account Management'
    questions:
      - question: 'How does billing work?'
        answer: 'We offer flexible billing options including monthly statements, case-by-case billing, and electronic invoicing. Payment terms are typically Net 30 for established accounts.'

      - question: 'Do you offer account credit terms?'
        answer: 'Yes, we provide credit terms for qualified dental practices. Contact our accounts team to set up credit terms and establish your account.'

      - question: 'How can I track my cases?'
        answer: 'You can track case progress through our online portal or by calling our customer service team. We provide real-time updates on case status and completion estimates.'

  - title: 'Technical Support'
    questions:
      - question: "What if a restoration doesn't fit properly?"
        answer: 'If a restoration requires adjustment, please contact us immediately. We will work with you to determine the best solution, which may include adjustments or a remake.'

      - question: 'Do you provide technical consultations?'
        answer: 'Yes, our experienced technicians are available for consultations on complex cases, material selection, and treatment planning. Contact us to schedule a consultation.'

      - question: 'How do I contact technical support?'
        answer: 'Our technical support team is available during business hours via phone, email, or through our online portal. For urgent technical issues, we provide after-hours support.'
